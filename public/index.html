<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <h1>Chat</h1>
          <p id="accountName">Signed out</p>
          <button type="button" class="logout-button" id="logoutButton">Logout</button>
        </div>

        <section class="panel-section">
          <div class="section-title">
            <span>Groups</span>
            <button type="button" class="icon-button" id="newRoomButton" title="New group">+</button>
          </div>
          <form class="inline-form" id="inviteForm">
            <input id="inviteInput" type="text" maxlength="32" placeholder="Invite friend" />
            <button type="submit">Invite</button>
          </form>
          <div class="nav-list" id="roomList"></div>
        </section>

        <section class="panel-section users-section">
          <div class="section-title">
            <span>People</span>
            <span class="online-pill"><span class="dot"></span><span id="onlineCount">0</span></span>
          </div>
          <form class="inline-form" id="friendForm">
            <input id="friendInput" type="text" maxlength="32" placeholder="Add username" />
            <button type="submit">Add</button>
          </form>
          <div class="nav-list" id="userList"></div>
        </section>
      </aside>

      <section class="chat">
        <header class="topbar">
          <button type="button" class="menu-button" id="menuButton">☰</button>
          <div>
            <h2 id="conversationTitle">General</h2>
            <p id="status">Connecting...</p>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="composer" class="composer">
          <button type="button" id="recordButton" class="secondary-button">Hold Voice</button>
          <input id="messageInput" type="text" autocomplete="off" placeholder="Message" maxlength="2000" />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <dialog id="authDialog">
      <form method="dialog" id="authForm" class="auth-form">
        <h2>Sign in</h2>
        <input id="usernameInput" type="text" autocomplete="username" maxlength="32" placeholder="Username" autofocus />
        <input id="displayNameInput" type="text" autocomplete="name" maxlength="32" placeholder="Display name for new account" />
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Password" />
        <p id="authError" class="error"></p>
        <div class="auth-actions">
          <button type="submit" id="loginButton">Login</button>
          <button type="button" class="secondary-button" id="registerButton">Register</button>
        </div>
      </form>
    </dialog>

    <dialog id="roomDialog">
      <form method="dialog" id="roomForm" class="auth-form">
        <h2>New group</h2>
        <input id="roomNameInput" type="text" maxlength="40" placeholder="Group name" />
        <div class="auth-actions">
          <button type="submit">Create</button>
          <button type="button" class="secondary-button" id="cancelRoomButton">Cancel</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
